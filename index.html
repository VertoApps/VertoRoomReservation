<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verto Room Reservation</title>

<link rel="icon" type="image/png" href="data:image/png;base64,YOUR_BASE64_HERE">

<style>
    *{
        box-sizing:border-box;
    }

    body{
        margin:0;
        font-family:Arial, Helvetica, sans-serif;
        background:#f4f7f6;
    }

    .container{
        max-width:500px;
        margin:100px auto;
        text-align:center;
        background:#fff;
        padding:40px;
        border-radius:12px;
        box-shadow:0 4px 15px rgba(0,0,0,.15);
    }

    h1{
        margin-top:0;
    }

    .btn{
        background:#4285f4;
        color:#fff;
        border:none;
        padding:15px 30px;
        font-size:18px;
        border-radius:6px;
        cursor:pointer;
    }

    .btn:hover{
        background:#3367d6;
    }

    .note{
        margin-top:25px;
        font-size:14px;
        color:#666;
        border-top:1px solid #eee;
        padding-top:15px;
    }

    #appContainer{
        display:none;
        width:100%;
        height:100vh;
    }

    #reservationFrame{
        width:100%;
        height:100%;
        border:none;
    }
</style>
</head>

<body>

<div class="container" id="landingPage">

    <h1>Verto Room Reservation</h1>

    <p>Please click below to access the reservation system.</p>

    <button class="btn" onclick="openReservation()">
        Open Reservation App
    </button>

    <div class="note">
        <strong>Troubleshooting:</strong><br><br>
        If you see a "Not Found" error, it is likely due to multiple Google
        accounts logged into your browser. Please try opening this link in an
        <strong>Incognito or Private window</strong>.
    </div>

</div>

<div id="appContainer">
    <iframe
        id="reservationFrame"
        src=""
        allowfullscreen>
    </iframe>
</div>

<script>
function openReservation(){

    document.getElementById("landingPage").style.display="none";

    document.getElementById("appContainer").style.display="block";

    document.getElementById("reservationFrame").src =
        "https://script.google.com/macros/s/AKfycby5NEZ_0Yw23IXETzWxmbz-g8wk9mM4Bhy4sJov8NM9Oq4F5GvwX4CgHeGPKnto_nxIuA/exec";

}
</script>

</body>
</html>
