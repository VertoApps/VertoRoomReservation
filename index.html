<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Verto Room Reservation</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            font-size: 18px;

            border-radius: 6px;
            margin-top: 20px;
            transition: background 0.3s;

        .btn:hover {

        .note {
            margin-top: 20px;
            font-size: 13px;

        <a href="https://script.google.com/macros/s/AKfycbyoaO3hiuPo4B3w1PLHrWPQzMYzApEzCVpAa1-VHZrJZZ_9V7Nh-4hEs-J-wlzJtPIpTQ/exec"
